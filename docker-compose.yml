version: '3.8'
services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://user:pass@db:5432/autosubdb
    depends_on:
      - db
    volumes:
      - ./videos:/app/videos
      - ./audio:/app/audio

  db:
    image: postgres:13
    environment:
      POSTGRES_DB: autosubdb
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
